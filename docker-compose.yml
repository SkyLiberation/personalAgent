services:
  backend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    depends_on:
      - neo4j
    command: >
      bash -lc "pip install -e . && uvicorn personal_agent.api:app --host 0.0.0.0 --port 8000"
  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    volumes:
      - ./:/app
    ports:
      - "5173:5173"
    command: >
      sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
  neo4j:
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs

volumes:
  neo4j-data:
  neo4j-logs:
